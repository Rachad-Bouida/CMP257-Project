<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacroBites</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar align-items-center">
  <div class="logo">Easy Recipes</div>

  <div class="search-box">
    <form class="d-flex">
      <input class="form-control me-2" type="search" placeholder="Search" id="search">
    </form>
  </div>

  <nav class="nav-links">
    <button id="theme-toggle" class="btn btn-sm" style="margin-right: 15px; background-color: #374151; color: white; border-radius: 8px;">Change Theme</button>
    <a href="/SIGN-IN/Login.html" id="loginLink">Login</a>
    <a href="/SIGN-IN/Signup.html" id="signupLink">Sign up</a>
    <a href="profile.html" id="profileLink" style="display:none;">Profile</a>
    <a href="#" id="logoutLink" style="display:none;">Logout</a>
  </nav>
</header>

<section class="hero position-relative">

  <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" class="d-block w-100">
      </div>

    </div>
  </div>

  <div class="hero-content position-absolute top-50 start-50 translate-middle text-center text-white">
    <h1>Eat Big, Lift Big.</h1>
    <p>Discover macro-friendly recipes to hit your targets.</p>
    <button class="btn btn-warning">Explore Recipes</button>
  </div>

</section>

<h2 class="section-title text-center mt-5">Trending Recipes</h2>

<section class="recipes">
  <!-- Cards structure --> 
  <!-- Change the numbers for the margins and paddings (mb, py, etc.) to whichever looks best-->
  <div class="container py-5">

    <div class="row mb-4 align-items-center">
      <h2 class="col-md-9">Recipes</h2>

      <div class="col-md-3">
        <select id="sortSelect" class="form-select">
          <option value="default">Sort By...</option>
          <option value="az">Alphabetical (A-Z)</option>
          <option value="protein">Highest Protein</option>
          <option value="calories">Lowest Calories</option>
        </select>
      </div>
    </div>

    <div class="row g-4" id="recipeContainer"></div>

  </div>

  <!-- Recipe popup -->
  <div class="modal fade" id="recipeModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle"></h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <img id="modalImg" class="img-fluid rounded mb-3">

          <h6 class="text-primary">Ingredients:</h6>
          <ul id="ingredients"></ul>

          <h6 class="text-primary">Instructions:</h6>
          <ol id="instructions"></ol>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button class="btn btn-warning" id="saveRecipe">Save Recipe</button>
        </div>

      </div>
    </div>
  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
