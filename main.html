<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacroBites</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="navbar align-items-center">
    <div class="logo">Easy Recipes</div>

    <div class="search-box">
      <form class="form-inline my-2 my-lg-0">
        <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search" id="search">
      </form>
    </div>
    
    
    <nav class="nav-links">
      <a href="/SIGN-IN/Login.html">Login </a>
      <a href="/SIGN-IN/Signup.html">Sign up</a>
    </nav>

    
  </header>

<section class="hero">
  <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
    
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" class="d-block w-100" alt="Food 1">
      </div>
      <div class="carousel-item">
        <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd" class="d-block w-100" alt="Food 2">
      </div>
      <div class="carousel-item">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" class="d-block w-100" alt="Food 3">
      </div>
    </div>

  </div>

  <div class="hero-content">
    <h1>Eat Big, Lift Big.</h1>
    <p>Discover macro-friendly recipes to hit your targets.</p>
    <button class="btn">Explore Recipes</button>
  </div>
</section>

  <h2 class="section-title">Trending Recipes</h2>

  <section class="recipes">
    <!-- Cards structure -->
          <!-- Change the numbers for the margins and paddings (mb, py, etc.) to whichever looks best-->
        <div class="container py-5">
            <div class="container row">
              <h2 class="mb-4 col-9">Recipes</h2>
              <select id="sortSelect" class="form-control col-3">
                <option value="default">Sort By...</option>
                <option value="az">Alphabetical (A-Z)</option>
                <option value="protein">Highest Protein</option>
                <option value="calories">Lowest Calories</option>
              </select>
            </div>
            <div class="row g-4" id="recipeContainer"></div>
        </div>
        <!-- Recipe popup -->
        <div class="modal fade" id="recipeModal" tabindex="-1">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                  <div class="modal-header">
                      <h5 class="modal-title" id="modalTitle"></h5>
                      <button class="btn-close" data-bs-dismiss="modal"></button>
                  </div>

                  <div class="modal-body">
                      <img id="modalImg" class="img-fluid rounded mb-3">

                      <h6 class="text-primary">Ingredients:</h6>
                      <ul id="ingredients"></ul>

                      <h6 class="text-primary">Instructions:</h6>
                      <ol id="instructions"></ol>
                  </div>

                  <div class="modal-footer">
                      <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                      <button class="btn btn-warning">Save Recipe</button>
                  </div>
                </div>
            </div>
        </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
