<!DOCTYPE html>
<html>
<head>
  <title>Macrobites - Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="profile.css">
  
</head>
<body>
  <header class="navbar align-items-center">
    <div class="logo">Macrobites</div>

   <div class="search-box">
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search" id="search">
      </form>
    </div>

    <nav class="nav-links">
      <button id="theme-toggle" class="btn btn-sm" style="margin-right: 15px; background-color: #374151; color: white; border-radius: 8px;">Change Theme</button>
      <a href="/index.html" id="signupLink">Home</a>
      <a href="#" id="logoutLink">Logout</a>
    </nav>
  </header>
  
  <section class="profile-hero text-center">
    <div class="profile-avatar"></div>
    <h1 id="profileName">My Saved Recipes</h1>
    <p id="profileEmail"></p>
    <div>
      <span class="stat-pill"><span id="savedCount">0</span> Saved</span>
    </div>
  </section>
  
  
  <section class="recipes">
    <!-- Cards structure --> 
    <!-- Change the numbers for the margins and paddings (mb, py, etc.) to whichever looks best-->
    <div class="container py-5">
      <div class="row align-items-center mb-4">
        <div class="col-6 col-sm-8 col-md-9">
          <h2 class="m-0 text-truncate">Recipes</h2>
        </div>
        <div class="col-6 col-sm-4 col-md-3">
          <select id="sortSelect" class="form-control">
            <option value="default">Sort By...</option>
            <option value="az">Alphabetical (A-Z)</option>
            <option value="protein">Highest Protein</option>
            <option value="calories">Lowest Calories</option>
          </select>
        </div>
      </div>
    
      <div class="row g-4" id="savedRecipeContainer"></div>
    </div>
  
    <!-- Recipe popup -->
    <div class="modal fade" id="recipeModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
  
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle"></h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
  
          <div class="modal-body">
            <img id="modalImg" class="img-fluid rounded mb-3">
  
            <h6 class="text-primary">Ingredients:</h6>
            <ul id="ingredients"></ul>
  
            <h6 class="text-primary">Instructions:</h6>
            <ol id="instructions"></ol>
          </div>
  
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button class="btn btn-outline-danger" id="removeFromModal">Remove from Saved</button>
          </div>
  
        </div>
      </div>
    </div>
  
  </section>
  
  <!-- Toast Notification Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
    <div id="actionToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">Action successful!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="/recipe.js"></script>
<script src="/Account/profile.js"></script>
</body>
</html>
