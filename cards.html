<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="cards.css">
    </head>
    <body>
        <!-- Cards structure -->
        <!-- Change the numbers for the margins and paddings (mb, py, etc.) to whichever looks best-->
        <div class="container py-5">
            <h2 class="mb-4">Recipes</h2>
            <div class="row g-4" id="recipeContainer"></div>
        </div>

        <!-- Recipe popup -->
        <div class="modal fade" id="recipeModal" tabindex="-1">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <img id="modalImg" class="img-fluid rounded mb-3">

                    <h6 class="text-primary">Ingredients:</h6>
                    <ul id="ingredients"></ul>

                    <h6 class="text-primary">Instructions:</h6>
                    <ol id="instructions"></ol>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-warning">Save Recipe</button>
                </div>

                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="cards.js"></script>
    </body>
</html>
