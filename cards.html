<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
        <link rel="stylesheet" href="cards.css">
    </head>
    <body>
        <!-- placeholder for nav -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
          
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                  <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Link</a>
                </li>
                <li class="nav-item dropdown">
                  <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    Dropdown
                  </a>
                  <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                    <a class="dropdown-item" href="#">Action</a>
                    <a class="dropdown-item" href="#">Another action</a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" href="#">Something else here</a>
                  </div>
                </li>
                <li class="nav-item">
                  <a class="nav-link disabled" href="#">Disabled</a>
                </li>
              </ul>

              <form class="form-inline my-2 my-lg-0">
                <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search" id="search">
              </form>
            </div>
          </nav>

        
          <!-- Cards structure -->
          <!-- Change the numbers for the margins and paddings (mb, py, etc.) to whichever looks best-->
          <div class="container py-5">
              <h2 class="mb-4">Recipes</h2>
              <div class="row g-4" id="recipeContainer"></div>
          </div>
  
          <!-- Recipe popup -->
          <div class="modal fade" id="recipeModal" tabindex="-1">
              <div class="modal-dialog modal-lg modal-dialog-centered">
                  <div class="modal-content">
  
                  <div class="modal-header">
                      <h5 class="modal-title" id="modalTitle"></h5>
                      <button class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
  
                  <div class="modal-body">
                      <img id="modalImg" class="img-fluid rounded mb-3">
  
                      <h6 class="text-primary">Ingredients:</h6>
                      <ul id="ingredients"></ul>
  
                      <h6 class="text-primary">Instructions:</h6>
                      <ol id="instructions"></ol>
                  </div>
  
                  <div class="modal-footer">
                      <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                      <button class="btn btn-warning">Save Recipe</button>
                  </div>
  
                  </div>
              </div>
          </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="cards.js"></script>
    </body>
</html>
