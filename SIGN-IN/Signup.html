<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroBites - Signup</title>
    <link rel="stylesheet" href="/SIGN-IN/Signup.css">
</head>
<body>

    <button id="theme-toggle" class="theme">Change Theme</button>

    <div class="Signup-container">
        <div class="brand">
            🔥 MacroBites
        </div>
        <p class="subtitle">Create an account and start eating healthy!</p>
        <form action="/dashboard" method="POST">
            <div class="form-group">
                <label for="email">Enter Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="Signup-btn">Sign Up</button>
        </form>
       <p class="signup-link">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script src="/SIGN-IN/script-sign.js"></script>
</body>
</html>
