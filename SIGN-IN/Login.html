<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroBites - Login</title>
    <link rel="stylesheet" href="/SIGN-IN/Login.css">
</head>
<body>

    <button id="theme-toggle" class="theme">Change Theme</button>

    <div class="login-container">
        <div class="brand">
            🔥 MacroBites
        </div>
        <p class="subtitle">Log in to track your macros and meals.</p>

        <form action="/main.html" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>

        <p class="signup-link"> Don't have an account? <a href="Signup.html">Sign up here</a></p>
    </div>

    <script src="/SIGN-IN/script-sign.js"></script>
</body>
</html>
